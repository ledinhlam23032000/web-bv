services:
  db:
    image: mariadb:11.4
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: hongphuc_wp
      MARIADB_USER: hongphuc
      MARIADB_PASSWORD: hongphuc_dev_password
      MARIADB_ROOT_PASSWORD: hongphuc_root_password
    volumes:
      - db_data:/var/lib/mysql

  wordpress:
    image: wordpress:php8.3-apache
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "10088:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: hongphuc_wp
      WORDPRESS_DB_USER: hongphuc
      WORDPRESS_DB_PASSWORD: hongphuc_dev_password
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_ENVIRONMENT_TYPE', 'local');
        define('FS_METHOD', 'direct');
    volumes:
      - wp_data:/var/www/html
      - ./wp-content/themes/hong-phuc:/var/www/html/wp-content/themes/hong-phuc
      - ./wp-content/plugins/hong-phuc-core:/var/www/html/wp-content/plugins/hong-phuc-core
      - ./uploads:/var/www/html/wp-content/uploads

  wpcli:
    image: wordpress:cli-php8.3
    profiles:
      - cli
    depends_on:
      - db
      - wordpress
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: hongphuc_wp
      WORDPRESS_DB_USER: hongphuc
      WORDPRESS_DB_PASSWORD: hongphuc_dev_password
    volumes:
      - wp_data:/var/www/html
      - ./wp-content/themes/hong-phuc:/var/www/html/wp-content/themes/hong-phuc
      - ./wp-content/plugins/hong-phuc-core:/var/www/html/wp-content/plugins/hong-phuc-core
      - ./uploads:/var/www/html/wp-content/uploads
    working_dir: /var/www/html

volumes:
  db_data:
  wp_data:
